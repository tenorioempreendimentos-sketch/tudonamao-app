  speech_to_text: ^7.0.0
  http: 1.5.0
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
