name: tudonamao
description: "Tudo na Maoo - Agenda, Finanças, Compras e muito mais"
publish_to: 'none'
version: 1.9.3+22

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: 6.1.5+1
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  intl: ^0.19.0
  uuid: ^4.3.3
  table_calendar: ^3.1.2
